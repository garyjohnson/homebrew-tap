name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update formula
        run: |
          FORMULA="Formula/${{ github.event.client_payload.formula }}.rb"
          VERSION="${{ github.event.client_payload.version }}"
          SHA256="${{ github.event.client_payload.sha256 }}"
          URL="${{ github.event.client_payload.url }}"

          sed -i "s|url \".*\"|url \"${URL}\"|" "$FORMULA"
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" "$FORMULA"
          sed -i "s|version \".*\"|version \"${VERSION}\"|" "$FORMULA" 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ github.event.client_payload.version }}"
          git add -A
          git commit -m "Update ${{ github.event.client_payload.formula }} to ${VERSION}"
          git push
